<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
  .b{width:90px;height:72px;background:#fff;border:1px solid #e2e8f0;display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
  .b6{border-radius:6px;}
  .b10{border-radius:10px;}
  .b16{border-radius:16px;}
  .b24{border-radius:24px;}
  .b50{border-radius:50px;width:130px;height:46px;}
</style>
</head>
<body>
<div class="card">
  <div class="b b6">6 · sm</div>
  <div class="b b10">10 · md</div>
  <div class="b b16">16 · lg</div>
  <div class="b b24">24 · xl</div>
  <div class="b b50">50 · pill</div>
</div>
</body>
</html>
