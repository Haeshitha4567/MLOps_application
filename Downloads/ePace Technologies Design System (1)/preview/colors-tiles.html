<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .tile{flex:1;min-width:100px;border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;align-items:flex-start;min-height:86px;}
  .tile .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .tile .name{font-size:11px;font-weight:700;color:var(--navy);}
  .tile .hex{font-family:var(--font-mono);font-size:9.5px;color:var(--fg3);}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="tile" style="background:#dbeafe;"><div class="icon" style="background:#fff;">💼</div><span class="name">Blue</span><span class="hex">#DBEAFE</span></div>
    <div class="tile" style="background:#ede9fe;"><div class="icon" style="background:#fff;">🤖</div><span class="name">Purple</span><span class="hex">#EDE9FE</span></div>
    <div class="tile" style="background:#ccfbf1;"><div class="icon" style="background:#fff;">👥</div><span class="name">Teal</span><span class="hex">#CCFBF1</span></div>
    <div class="tile" style="background:#e0e7ff;"><div class="icon" style="background:#fff;">🌍</div><span class="name">Indigo</span><span class="hex">#E0E7FF</span></div>
    <div class="tile" style="background:#e0f2fe;"><div class="icon" style="background:#fff;">☁️</div><span class="name">Sky</span><span class="hex">#E0F2FE</span></div>
    <div class="tile" style="background:#fef3c7;"><div class="icon" style="background:#fff;">📊</div><span class="name">Amber</span><span class="hex">#FEF3C7</span></div>
    <div class="tile" style="background:#ffe4e6;"><div class="icon" style="background:#fff;">🛡️</div><span class="name">Rose</span><span class="hex">#FFE4E6</span></div>
    <div class="tile" style="background:#d1fae5;"><div class="icon" style="background:#fff;">⚙️</div><span class="name">Green</span><span class="hex">#D1FAE5</span></div>
    <div class="tile" style="background:#ffedd5;"><div class="icon" style="background:#fff;">🎯</div><span class="name">Orange</span><span class="hex">#FFEDD5</span></div>
  </div>
</div>
</body>
</html>
