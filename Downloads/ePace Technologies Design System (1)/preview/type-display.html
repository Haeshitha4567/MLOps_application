<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;}
  .row{display:flex;flex-direction:column;gap:10px;}
  .item{display:flex;align-items:baseline;gap:14px;}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg3);width:130px;flex-shrink:0;letter-spacing:.4px;}
  .spec{font-family:'Plus Jakarta Sans',sans-serif;color:var(--navy);}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><span class="label">Hero · 3.2rem · 800</span><span class="spec" style="font-size:3.2rem;font-weight:800;letter-spacing:-1px;line-height:1;">Placing People First</span></div>
    <div class="item"><span class="label">H1 · 2.7rem · 800</span><span class="spec" style="font-size:2.2rem;font-weight:800;letter-spacing:-0.5px;">Our Services</span></div>
    <div class="item"><span class="label">H2 · 2.25rem · 700</span><span class="spec" style="font-size:1.9rem;font-weight:700;letter-spacing:-0.4px;">How We Deliver</span></div>
  </div>
</div>
</body>
</html>
