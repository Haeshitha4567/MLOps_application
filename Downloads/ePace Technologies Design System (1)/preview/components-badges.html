<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:22px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{display:inline-block;padding:3px 11px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .b-blue{background:#dbeafe;color:#1347c0;}
  .b-green{background:#d1fae5;color:#059669;}
  .b-purple{background:#ede9fe;color:#6d28d9;}
  .b-amber{background:#fef3c7;color:#d97706;}
  .dark{background:#0b1f3a;border-radius:10px;padding:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .loc{padding:3px 10px;border-radius:50px;font-size:10.5px;font-weight:700;text-transform:uppercase;}
  .l-hq{background:rgba(26,86,219,0.25);color:#60a5fa;}
  .l-dev{background:rgba(16,185,129,0.2);color:#4ade80;}
  .l-new{background:rgba(245,158,11,0.2);color:#fbbf24;}
  .chip{background:#fff;border:1px solid #e2e8f0;border-radius:50px;padding:9px 20px;font-weight:700;font-size:13px;color:#64748b;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <span class="badge b-blue">AI / ML</span>
    <span class="badge b-green">Remote</span>
    <span class="badge b-purple">Direct Hire</span>
    <span class="badge b-amber">Urgent</span>
    <span class="chip">Dell</span>
    <span class="chip">Verizon</span>
  </div>
  <div class="dark">
    <span class="loc l-hq">Headquarters</span>
    <span class="loc l-dev">Dev Center</span>
    <span class="loc l-new">Nearshore</span>
  </div>
</div>
</body>
</html>
