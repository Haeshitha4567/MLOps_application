<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;justify-content:space-between;min-height:90px;font-size:11px;line-height:1.3;border:1px solid rgba(0,0,0,0.04);}
  .sw .name{font-weight:700;font-size:12px;}
  .sw .hex{font-family:var(--font-mono);opacity:0.75;font-size:10.5px;}
  .on-dark{color:#fff;}
  .on-light{color:var(--fg1);}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw on-dark" style="background:#0b1f3a;"><span class="name">Navy</span><span class="hex">#0B1F3A</span></div>
    <div class="sw on-dark" style="background:#102848;"><span class="name">Navy Mid</span><span class="hex">#102848</span></div>
    <div class="sw on-dark" style="background:#1a3a5c;"><span class="name">Navy Light</span><span class="hex">#1A3A5C</span></div>
    <div class="sw on-dark" style="background:#1a56db;"><span class="name">Blue</span><span class="hex">#1A56DB</span></div>
    <div class="sw on-dark" style="background:#1347c0;"><span class="name">Blue Dark</span><span class="hex">#1347C0</span></div>
    <div class="sw on-dark" style="background:#60a5fa;"><span class="name">Sky Accent</span><span class="hex">#60A5FA</span></div>
    <div class="sw on-light" style="background:#dbeafe;"><span class="name">Blue Light</span><span class="hex">#DBEAFE</span></div>
  </div>
</div>
</body>
</html>
