<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .box{display:flex;flex-direction:column;align-items:center;gap:8px;font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
  .s{background:#dbeafe;border:1px dashed #1a56db;}
  .l{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="box"><div class="s" style="width:4px;height:4px;"></div><span>4 · --space-1</span></div>
    <div class="box"><div class="s" style="width:8px;height:8px;"></div><span>8 · --space-2</span></div>
    <div class="box"><div class="s" style="width:12px;height:12px;"></div><span>12 · --space-3</span></div>
    <div class="box"><div class="s" style="width:16px;height:16px;"></div><span>16 · --space-4</span></div>
    <div class="box"><div class="s" style="width:24px;height:24px;"></div><span>24 · --space-6</span></div>
    <div class="box"><div class="s" style="width:32px;height:32px;"></div><span>32 · --space-8</span></div>
    <div class="box"><div class="s" style="width:48px;height:48px;"></div><span>48 · --space-12</span></div>
    <div class="box"><div class="s" style="width:64px;height:64px;"></div><span>64 · --space-16</span></div>
    <div class="box"><div class="s" style="width:90px;height:90px;"></div><span>90 · section</span></div>
  </div>
</div>
</body>
</html>
