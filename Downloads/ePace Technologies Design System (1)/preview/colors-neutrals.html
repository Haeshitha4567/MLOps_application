<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:20px 24px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .sw{flex:1;min-width:62px;border-radius:8px;padding:10px 8px;min-height:64px;display:flex;flex-direction:column;justify-content:flex-end;font-size:10px;line-height:1.25;border:1px solid rgba(0,0,0,0.04);}
  .sw .name{font-weight:700;font-size:11px;}
  .sw .hex{font-family:var(--font-mono);opacity:0.7;font-size:9.5px;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#f8fafc;color:#0f172a;"><span class="name">50</span><span class="hex">#F8FAFC</span></div>
    <div class="sw" style="background:#f1f5f9;color:#0f172a;"><span class="name">100</span><span class="hex">#F1F5F9</span></div>
    <div class="sw" style="background:#e2e8f0;color:#0f172a;"><span class="name">200</span><span class="hex">#E2E8F0</span></div>
    <div class="sw" style="background:#cbd5e1;color:#0f172a;"><span class="name">300</span><span class="hex">#CBD5E1</span></div>
    <div class="sw" style="background:#94a3b8;color:#fff;"><span class="name">400</span><span class="hex">#94A3B8</span></div>
    <div class="sw" style="background:#64748b;color:#fff;"><span class="name">500</span><span class="hex">#64748B</span></div>
    <div class="sw" style="background:#475569;color:#fff;"><span class="name">600</span><span class="hex">#475569</span></div>
    <div class="sw" style="background:#334155;color:#fff;"><span class="name">700</span><span class="hex">#334155</span></div>
    <div class="sw" style="background:#1e293b;color:#fff;"><span class="name">800</span><span class="hex">#1E293B</span></div>
    <div class="sw" style="background:#0f172a;color:#fff;"><span class="name">900</span><span class="hex">#0F172A</span></div>
  </div>
</div>
</body>
</html>
