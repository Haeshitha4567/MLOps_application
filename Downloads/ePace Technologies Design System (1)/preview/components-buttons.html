<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .card{padding:22px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px;border:none;cursor:pointer;font-family:inherit;}
  .btn-lg{padding:14px 28px;font-size:15px;border-radius:10px;}
  .btn-primary{background:linear-gradient(135deg,#1a56db 0%,#1347c0 100%);color:#fff;box-shadow:0 8px 32px rgba(26,86,219,0.28);}
  .btn-outline{background:transparent;color:#1a56db;border:2px solid #1a56db;}
  .btn-white{background:#fff;color:#1a56db;box-shadow:0 4px 16px rgba(0,0,0,0.08);border:1px solid #e2e8f0;}
  .dark{background:#0b1f3a;border-radius:10px;padding:14px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn-ghost{background:rgba(255,255,255,0.14);color:#fff;border:1.5px solid rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div class="card">
  <button class="btn btn-primary btn-lg">Hire Top Talent →</button>
  <button class="btn btn-primary">Send Message</button>
  <button class="btn btn-outline">View All</button>
  <button class="btn btn-white">Hire Talent</button>
  <div class="dark">
    <button class="btn btn-primary">Explore →</button>
    <button class="btn btn-ghost btn-lg">Browse Jobs</button>
  </div>
</div>
</body>
</html>
