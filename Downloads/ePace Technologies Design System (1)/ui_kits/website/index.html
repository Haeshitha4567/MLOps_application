<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ePace Technologies — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="kit.css"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a56db'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold' font-size='14'>eP</text></svg>"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="AISection.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel" src="ExtraPages.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('epace_page') || 'home');
  const nav = (p) => { setPage(p); localStorage.setItem('epace_page', p); window.scrollTo({top:0, behavior:'instant'}); };

  return (
    <div data-screen-label={pageLabel(page)}>
      <TopBar/>
      <Header current={page} onNavigate={nav}/>
      {page === 'home' && <>
        <Hero onCta={nav}/>
        <StatsStrip/>
        <Services/>
        <AISection onCta={nav}/>
        <GlobalSection/>
        <Process/>
        <Clients/>
        <Testimonials/>
        <CTA onCta={nav}/>
        <ContactSection/>
      </>}
      {page === 'services' && <>
        <PageHeader title="Our Capabilities" subtitle="Delivery-led digital transformation across AI, cloud, data and modern applications" crumb="Capabilities"/>
        <Services title="Capabilities That Power Digital Transformation" showAll={false}/>
        <AISection onCta={nav}/>
        <GlobalSection/>
        <Process/>
        <CTA onCta={nav}/>
      </>}
      {page === 'careers' && <>
        <PageHeader title="Careers & Open Positions" subtitle="Join a delivery-led team shipping AI, cloud and data platforms for the world's leading enterprises" crumb="Careers"/>
        <CareersList/>
        <CTA onCta={nav}/>
      </>}
      {page === 'contact' && <>
        <PageHeader title="Contact Us" subtitle="Tell us what you need — we'll respond within one business day." crumb="Contact"/>
        <ContactSection/>
      </>}
      {page === 'about' && <AboutPage onCta={nav}/>}
      {page === 'testimonials' && <CaseStudiesPage onCta={nav}/>}
      {page === 'employee' && <EmployeePage onCta={nav}/>}
      <Footer/>
    </div>
  );
}

function titleFor(p){return {about:'About Us', testimonials:'Case Studies', employee:'Employee Portal'}[p] || '';}
function pageLabel(p){return {home:'01 Home', services:'02 Capabilities', careers:'03 Careers', contact:'04 Contact', about:'05 About', testimonials:'06 Case Studies', employee:'07 Employee'}[p];}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
